services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: famcal
      POSTGRES_USER: famcal
      POSTGRES_PASSWORD: famcal
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U famcal -d famcal"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    command: npx prisma migrate deploy
    env_file: .env
    environment:
      DATABASE_URL: "postgresql://famcal:famcal@db:5432/famcal?sslmode=disable"
    depends_on:
      db:
        condition: service_healthy

  app:
    build: .
    command: npm run start
    env_file: .env
    environment:
      DATABASE_URL: "postgresql://famcal:famcal@db:5432/famcal?sslmode=disable"
      APP_URL: "http://localhost:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "3000:3000"

  worker:
    build: .
    command: npm run worker:reminders
    env_file: .env
    environment:
      DATABASE_URL: "postgresql://famcal:famcal@db:5432/famcal?sslmode=disable"
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  postgres-data:
